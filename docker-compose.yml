version: "3.9"
services:
  threatsignal:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./reports:/app/reports
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
